<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Juanmo Times</title>
  <meta name="description" content="Tu hub diario de noticias — internacionales, economía, tecnología, deportes y más." />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Juanmo Times" />

  <!-- Icon -->
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <!-- PWA manifest (inlined as data URL — no manifest.json file needed) -->
  <link rel="manifest" href='data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22The%20Juanmo%20Times%22%2C%22short_name%22%3A%22Juanmo%20Times%22%2C%22description%22%3A%22Tu%20hub%20diario%20de%20noticias%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f172a%22%2C%22theme_color%22%3A%22%230f172a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon.svg%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D' />

  <!-- Open Graph -->
  <meta property="og:title" content="The Juanmo Times" />
  <meta property="og:description" content="Tu hub diario de noticias — internacionales, economía, tecnología, deportes y más." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="The Juanmo Times" />
  <meta property="og:image" content="icon.svg" />
  <meta name="twitter:card" content="summary" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- App -->
  <script src="app.js" defer></script>
</head>
<body>

<a class="skip-link" href="#main">Saltar al contenido</a>

<header>
  <div id="scroll-progress" class="scroll-progress" aria-hidden="true"></div>
  <div class="header-top">
    <div class="header-brand">
      <div class="logo">The <span>Juanmo</span> Times</div>
      <span id="new-count" class="new-count" aria-live="polite"></span>
    </div>
    <div class="header-meta" aria-hidden="false">
      <span id="today-date"></span>
      <span id="last-update">Cargando...</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="btn-search" title="Buscar (Ctrl+K)" aria-label="Buscar noticias (Ctrl+K)"><span aria-hidden="true">🔍</span></button>
      <button class="header-btn" id="btn-saved" title="Guardadas" aria-label="Ver guardadas"><span aria-hidden="true">⭐</span></button>
      <button class="header-btn" id="btn-refresh" title="Actualizar" aria-label="Actualizar noticias"><span aria-hidden="true">↻</span></button>
      <button class="header-btn" id="btn-hide-read" title="Ocultar leídas" aria-label="Alternar ocultar leídas" aria-pressed="false"><span aria-hidden="true">👁</span></button>
      <button class="header-btn" id="btn-theme" title="Cambiar tema" aria-label="Cambiar tema"><span aria-hidden="true">☾</span></button>
    </div>
  </div>
  <div class="tabs-container">
    <button class="tab-scroll-btn tab-scroll-left" type="button" aria-label="Desplazar categorías a la izquierda" hidden><span aria-hidden="true">‹</span></button>
    <nav class="tabs-wrapper" aria-label="Categorías">
      <div class="tabs" role="tablist">
        <button class="tab" role="tab" aria-selected="true" data-cat="destacadas"><span aria-hidden="true">⭐</span> Destacadas</button>
        <button class="tab" role="tab" aria-selected="false" data-cat="todas"><span aria-hidden="true">🌐</span> Todas</button>
        <button class="tab" role="tab" aria-selected="false" data-cat="internacional"><span aria-hidden="true">🌍</span> Internacional</button>
        <button class="tab" role="tab" aria-selected="false" data-cat="economia"><span aria-hidden="true">💰</span> Economía</button>
        <button class="tab" role="tab" aria-selected="false" data-cat="iglesia"><span aria-hidden="true">✝️</span> Iglesia</button>
        <button class="tab" role="tab" aria-selected="false" data-cat="tecnologia"><span aria-hidden="true">🤖</span> Tecnología</button>
        <button class="tab" role="tab" aria-selected="false" data-cat="deportes"><span aria-hidden="true">⚽</span> Deportes</button>
        <button class="tab" role="tab" aria-selected="false" data-cat="belico"><span aria-hidden="true">⚔️</span> Bélico</button>
        <button class="tab" role="tab" aria-selected="false" data-cat="uruguay"><span aria-hidden="true">🇺🇾</span> Uruguay</button>
      </div>
    </nav>
    <button class="tab-scroll-btn tab-scroll-right" type="button" aria-label="Desplazar categorías a la derecha" hidden><span aria-hidden="true">›</span></button>
  </div>
</header>

<main id="main" role="tabpanel" aria-labelledby="section-label">
  <div id="section-label" class="section-label">Cargando noticias...</div>
  <div id="grid" class="grid"></div>
</main>

<!-- Command palette -->
<div class="palette-backdrop" id="palette-backdrop" role="presentation">
  <div class="palette" role="dialog" aria-modal="true" aria-label="Buscar noticias y comandos">
    <div class="palette-input-wrap">
      <span class="icon" aria-hidden="true">🔍</span>
      <input id="palette-input" class="palette-input" type="text" placeholder="Buscar noticias o ejecutar comando..." autocomplete="off" spellcheck="false" />
      <span class="palette-hint" aria-hidden="true">Esc</span>
    </div>
    <ul id="palette-results" class="palette-results" role="listbox"></ul>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

</body>
</html>
