name: Actualizar noticias

on:
  schedule:
    # 7am, 1pm y 7pm hora Uruguay (UTC-3) = 10:00, 16:00, 22:00 UTC
    - cron: '0 10 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:  # permite ejecutar manualmente desde GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install feedparser

      - name: Buscar noticias
        run: python fetch_news.py

      - name: Guardar news.json en el repo
        run: |
          git config user.name  "Juanmo Times Bot"
          git config user.email "action@github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "noticias: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
